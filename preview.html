<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Lead Suite - Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #e2e8f0;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 40px;
        }
        h2.section-title {
            color: #334155;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .btn-group-preview {
            margin-bottom: 40px;
        }
        .btn-group-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        /* Popup Overlay Simulation */
        .popup-overlay {
            background: rgba(15, 23, 42, 0.6);
            padding: 40px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .popup-box {
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .close-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-family: sans-serif;
            border: 2px solid #fff;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Nexus Lead Suite - Updated Design Preview</h1>

        <h2 class="section-title">1. Menu Buttons (menu-items.json)</h2>
        
        <div id="buttons-container"></div>

        <h2 class="section-title" style="margin-top: 60px;">2. Popups (popups.json)</h2>

        <div id="popups-container"></div>
    </div>

    <script>
        const menuItemsData = {
            "groups": [
                {
                    "name": "New Button Group (Group 1)",
                    "buttons": [
                        { "label": "New Action Button", "style": { "bg": "#4F46E5", "text": "#ffffff", "paddingVertical": "14", "paddingHorizontal": "28", "radius": "12", "hoverEffect": "glow" } },
                        { "label": "New Action Button", "style": { "bg": "#0F172A", "text": "#ffffff", "paddingVertical": "14", "paddingHorizontal": "28", "radius": "12", "hoverEffect": "glow" } },
                        { "label": "New Action Button", "style": { "bg": "#F59E0B", "text": "#ffffff", "paddingVertical": "14", "paddingHorizontal": "28", "radius": "12", "hoverEffect": "glow" } },
                        { "label": "New Action Button", "style": { "bg": "#10B981", "text": "#ffffff", "paddingVertical": "14", "paddingHorizontal": "28", "radius": "12", "hoverEffect": "glow" } },
                        { "label": "New Action Button", "style": { "bg": "#EC4899", "text": "#ffffff", "paddingVertical": "14", "paddingHorizontal": "28", "radius": "12", "hoverEffect": "glow" } }
                    ]
                },
                {
                    "name": "New Button Group (Group 2)",
                    "buttons": [
                        { "label": "New Action Button", "style": { "bg": "#6366F1", "text": "#ffffff", "paddingVertical": "16", "paddingHorizontal": "32", "radius": "50", "hoverEffect": "glow" } },
                        { "label": "New Action Button", "style": { "bg": "#3B82F6", "text": "#ffffff", "paddingVertical": "16", "paddingHorizontal": "32", "radius": "50", "hoverEffect": "glow" } }
                    ]
                }
            ]
        };

        const popupsData = {
            "popups": [
                {
                    "heading": "<h2 style=\"margin:0;font-family:'Inter', sans-serif;font-weight:800;font-size:32px;letter-spacing:-1px;color:#FFFFFF;\">Book Your <span style=\"background: linear-gradient(90deg, #FACC15, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\">Consultation</span></h2>",
                    "subHeading": "GET EXPERT ADVICE WITHIN 24 HOURS.",
                    "textAlign": "left",
                    "content": "<p>[forminator_form id=\"244624\"]</p><div style=\"opacity:0.5; font-size:12px; margin-top:10px;\">(Form Placeholder)</div>",
                    "style": {
                        "headingTextColor": "#FFFFFF",
                        "headingBgColor": "#0F172A",
                        "bodyBgColor": "#FFFFFF",
                        "width": "640",
                        "radius": "24",
                        "padding": "40",
                        "closeIconSize": "20",
                        "closeIconColor": "#94A3B8",
                        "closeIconBg": "#1E293B"
                    }
                },
                {
                    "heading": "<h2 style=\"margin:0;font-family:'Inter', sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;color:#111827;\">New <span style=\"background: linear-gradient(90deg, #4F46E5, #EC4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\">Campaign</span> Heading</h2>",
                    "subHeading": "Sub-text here",
                    "textAlign": "left",
                    "content": "<p>Content...</p>",
                    "style": {
                        "headingTextColor": "#111827",
                        "headingBgColor": "#F8FAFC",
                        "bodyBgColor": "#FFFFFF",
                        "width": "500",
                        "radius": "24",
                        "padding": "32",
                        "closeIconSize": "20",
                        "closeIconColor": "#64748B",
                        "closeIconBg": "#F1F5F9"
                    }
                }
            ]
        };

        // Render Buttons
        const btnsContainer = document.getElementById('buttons-container');
        menuItemsData.groups.forEach(group => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'btn-group-preview';
            
            const title = document.createElement('div');
            title.className = 'btn-group-title';
            title.innerText = group.name;
            groupDiv.appendChild(title);

            const rowDiv = document.createElement('div');
            rowDiv.className = 'buttons-row';

            group.buttons.forEach(btn => {
                const b = document.createElement('button');
                b.innerText = btn.label;
                const border = btn.style.bg === 'transparent' || btn.style.bg === '#f8fafc' ? '1px solid #cbd5e1' : 'none';
                
                b.style.cssText = `
                    background: ${btn.style.bg};
                    color: ${btn.style.text};
                    padding: ${btn.style.paddingVertical}px ${btn.style.paddingHorizontal}px;
                    border-radius: ${btn.style.radius}px;
                    border: ${border};
                    font-size: 15px;
                    font-weight: 500;
                    cursor: pointer;
                    font-family: inherit;
                    transition: all 0.3s ease;
                `;
                
                b.onmouseover = () => {
                    b.style.transform = 'translateY(-2px)';
                    if(btn.style.hoverEffect === 'glow') {
                        b.style.boxShadow = `0 10px 15px -3px ${btn.style.bg !== 'transparent' ? btn.style.bg : '#94a3b8'}66`;
                    }
                };
                b.onmouseout = () => {
                    b.style.transform = 'translateY(0)';
                    b.style.boxShadow = 'none';
                };
                
                rowDiv.appendChild(b);
            });

            groupDiv.appendChild(rowDiv);
            btnsContainer.appendChild(groupDiv);
        });

        // Render Popups
        const popupsContainer = document.getElementById('popups-container');
        popupsData.popups.forEach((popup, index) => {
            const overlay = document.createElement('div');
            overlay.className = 'popup-overlay';

            const pBox = document.createElement('div');
            pBox.className = 'popup-box';
            pBox.style.cssText = `
                width: 100%;
                max-width: ${popup.style.width}px;
                border-radius: ${popup.style.radius}px;
                background: ${popup.style.bodyBgColor};
                overflow: hidden;
            `;

            // Heading Area
            const header = document.createElement('div');
            header.style.cssText = `
                background: ${popup.style.headingBgColor};
                color: ${popup.style.headingTextColor};
                padding: ${popup.style.padding}px;
                text-align: ${popup.textAlign};
            `;
            header.innerHTML = popup.heading;
            
            if (popup.subHeading) {
                const sub = document.createElement('div');
                sub.style.cssText = `margin-top: 10px; font-size: 15px; opacity: 0.8; font-weight: 500;`;
                sub.innerText = popup.subHeading;
                header.appendChild(sub);
            }

            pBox.appendChild(header);

            // Content Area
            const content = document.createElement('div');
            content.style.cssText = `
                padding: ${popup.style.padding}px;
                color: #334155;
            `;
            content.innerHTML = popup.content;
            pBox.appendChild(content);

            // Close Button
            const closeBtn = document.createElement('div');
            closeBtn.className = 'close-btn';
            closeBtn.innerHTML = '✕';
            closeBtn.style.cssText = `
                width: ${popup.style.closeIconSize * 1.5}px;
                height: ${popup.style.closeIconSize * 1.5}px;
                background: ${popup.style.closeIconBg};
                color: ${popup.style.closeIconColor};
                font-size: ${popup.style.closeIconSize}px;
            `;
            pBox.appendChild(closeBtn);

            overlay.appendChild(pBox);
            popupsContainer.appendChild(overlay);
        });
    </script>
</body>
</html>
